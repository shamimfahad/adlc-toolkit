# .adlc/config.yml — Per-project configuration
# This file holds everything stack-specific. Skills read it at runtime.
# Replace every <placeholder> with a real value, or delete sections that don't apply.

project:
  name: <project-name>
  description: <one-line description>

# Git policy — how much git the assistant may run. The WHOLE pipeline respects
# this; /ship's autonomy.git (below) may lower it but never exceed it. Set by /init.
#
#   manual       — (default) the assistant never runs git writes. It drafts the
#                  commit message (commits-draft.md), PR body (pr-draft.md), and
#                  merge-checklist.md; you run every git command yourself.
#   commit       — the assistant may `git add` + `git commit` on the REQ's feature
#                  branch, after that phase's gate is approved, using the drafted
#                  message. You still push and open/merge the PR.
#   commit+push  — also `git push` the REQ's feature branch (fast-forward only).
#                  You still open and merge the PR.
#
# Invariants in EVERY mode (never overridable): only the REQ's own feature branch;
# never commit/push to a `protect:` branch; never force-push, rebase, amend
# published commits, `reset --hard` away commits, delete branches, run
# `gh pr create` / `gh pr merge`, or use `--no-verify`. Read commands
# (status / diff / log / show) are always allowed.
git:
  mode: manual
  protect: [main, master, release/*]

stack:
  # Declare what's in use. Skills read these to decide what stack-specific
  # behavior to enable.
  languages: [<typescript|python|csharp|...>]
  frontends: [<react|vue|ios|android|...>]   # optional
  backends: [<node|dotnet|django|cloud-run|lambda|...>]   # optional
  databases: [<postgres|firestore|sqlserver|...>]   # optional

# Isolation strategy for in-flight REQs. Determines whether /architect and
# /bugfix create an isolated git worktree per REQ or work directly on a
# feature branch in the user's current checkout.
#
#   auto      — default. Branch for single-REQ skills (/proceed, /bugfix);
#               worktree for /sprint (parallelism requires it) and for
#               cross-repo REQs (mode is forced regardless of this setting).
#   branch    — always use a branch on the current checkout. /sprint and
#               cross-repo REQs still escalate to worktree.
#   worktree  — always create an isolated worktree per REQ. Older default;
#               useful if you don't use a stateful editor like VS Code, or
#               prefer one-line aborts via `git worktree remove --force`.
#
# Trade-off: branch mode keeps your editor session intact across REQ start
# and abort, but requires a clean working tree at the start of each REQ.
# Worktree mode tolerates a dirty main checkout but each REQ start is a
# folder switch in your editor.
workflow:
  isolation: auto

# Autonomy — used only by /ship (the autonomous pipeline). /proceed ignores this
# block and always pauses at every gate. If this block is absent, /ship falls back
# to safe defaults (gates: assisted, git: read-only, escalation: cautious) and
# tells you it's doing so. Uncomment and tune to opt into more autonomy.
#
# autonomy:
#   gates: auto              # manual | assisted | auto   (who clears each gate)
#   git: commit+push         # read-only | commit | commit+push
#                            #   the autonomous git ceiling for /ship. Capped by
#                            #   the top-level `git.mode` — it can lower it but
#                            #   never exceed it (git.mode: manual ⇒ /ship is
#                            #   read-only too). push is feature-branch +
#                            #   fast-forward only — never main, force, or rewrite
#   escalation: balanced     # cautious | balanced | aggressive  (decision-maker bias)
#   rework_cap_per_gate: 2   # max REWORK loops at one gate before forced HALT
#   rework_budget_total: 5   # max REWORK loops across the whole run
#   confidence_floor: 0.6    # any verdict below this confidence becomes HALT
#   packet_max_bytes: 24576  # cap on the gate packet sent to the decision-maker
#   hard_stops:              # categories that always HALT for the human
#     - auth
#     - security
#     - secrets
#     - payments
#     - data-migration
#     - public-api-contract
#     - irreversible
#   notify:
#     on_halt: true          # ping when the run halts and needs you
#     on_complete: true      # ping when the terminal review is ready

# Repository layout. For single-repo projects, leave the `repos:` block out
# entirely — skills fall back to single-repo behavior.
# For multi-repo features, every repo that may originate a REQ gets its own
# .adlc/ vault and its own config.yml. Configs are mirror images of each
# other: each repo marks itself primary: true and lists the others as siblings.
repos:
  <this-repo-id>:
    primary: true
  # <sibling-id>:
  #   path: ../<sibling-folder>

# merge_order: default order when merging cross-repo REQs.
# Only used when more than one repo is touched.
# merge_order:
#   - <repo-id>
#   - <repo-id>

# Per-repo service metadata. Used by deploy-aware skills (none in this toolkit
# by default — Claude doesn't run deploys). Keep this block if you have
# external scripts that consume it; remove otherwise.
# services:
#   <repo-id>:
#     deploy_target: <name>
#     region: <region>

# Stack-specific deploy targets. Used only by skills that surface deploy
# checklists for *you* to run. Claude never deploys.
# deploy:
#   staging: <command-or-target>
#   production: <command-or-target>

# Optional: paths Claude should treat as read-only legacy code
# (Karpathy's "raw sources" layer — the immutable input the vault curates).
# Read-only verification is allowed; writes never are.
# read_only_sources:
#   - D:/legacy/codebase
#   - D:/legacy/contracts

# Optional: paths Claude is forbidden from reading at all (secrets, prod data).
# forbidden_paths:
#   - .env.production
#   - secrets/
